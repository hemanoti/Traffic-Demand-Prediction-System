<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Traffic Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navigation -->

<nav class="navbar">

    <div class="logo">

        <i class="fa-solid fa-car"></i>

        <span>Traffic Prediction System</span>

    </div>

    <ul>

        <li><a href="/">Home</a></li>

        <li><a href="/predict_page" class="active">Predict Traffic</a></li>

    </ul>

</nav>

<!-- Prediction Form -->

<section class="prediction-section">

    <div class="prediction-card">

        <h1>Traffic Demand Prediction</h1>

        <p>Enter the traffic and weather details to predict traffic demand.</p>

        <form action="/predict" method="POST" class="prediction-form">

            <div class="form-group">
                <label>Timestamp</label>
                <input type="datetime-local" name="timestamp" required>
            </div>

            <div class="form-group">
                <label>Road Type</label>
                <select name="road_type">
                    <option>Urban</option>
                    <option>Highway</option>
                    <option>Rural</option>
                </select>
            </div>

            <div class="form-group">
                <label>Number of Lanes</label>
                <input type="number" name="number_of_lanes" required>
            </div>

            <div class="form-group">
                <label>Speed Limit</label>
                <input type="number" name="speed_limit" required>
            </div>

            <div class="form-group">
                <label>Weather Condition</label>
                <select name="weather_condition">
                    <option>Clear</option>
                    <option>Cloudy</option>
                    <option>Rain</option>
                    <option>Fog</option>
                </select>
            </div>

            <div class="form-group">
                <label>Temperature (°C)</label>
                <input type="number" step="0.1" name="temperature" required>
            </div>

            <div class="form-group">
                <label>Humidity (%)</label>
                <input type="number" name="humidity" required>
            </div>

            <div class="form-group">
                <label>Rainfall (mm)</label>
                <input type="number" step="0.1" name="rainfall" required>
            </div>

            <div class="form-group">
                <label>Wind Speed</label>
                <input type="number" step="0.1" name="wind_speed" required>
            </div>

            <div class="form-group">
                <label>Visibility</label>
                <input type="number" name="visibility" required>
            </div>

            <div class="form-group">
                <label>Nearby Intersections</label>
                <input type="number" name="nearby_intersections" required>
            </div>

            <div class="form-group">
                <label>Event Type</label>
                <select name="event_type">
                    <option>None</option>
                    <option>Festival</option>
                    <option>Concert</option>
                    <option>Sports</option>
                    <option>Accident</option>
                </select>
            </div>

            <div class="button-area">

                <button type="submit">

                    <i class="fa-solid fa-chart-line"></i>

                    Predict Traffic

                </button>

            </div>

        </form>

        {% if prediction_text %}

        <div class="result-card">

            <h2>{{ prediction_text }}</h2>

        </div>

        {% endif %}

    </div>

</section>

</body>
</html>
